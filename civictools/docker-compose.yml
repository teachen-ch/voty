services:
  pocketbase:
    build:
      context: ./pb
    container_name: civictools-pb
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
      - ./frontend/dist:/pb/frontend/dist:ro
    environment:
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-admin@civictools.local}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD:-changeme123}

volumes:
  pb_data:
