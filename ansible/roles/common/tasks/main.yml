---
- name: Create app directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - "{{ app_dir }}"
    - "{{ app_dir }}/nginx"
    - "{{ app_dir }}/maintenance"
    - "{{ app_dir }}/traefik/acme"
    - "{{ app_dir }}/traefik/logs"
    - "{{ app_dir }}/traefik/rules"
    - "{{ app_dir }}/traefik/shared"

- name: Initialise acme.json (Traefik requires mode 600; never overwrite existing)
  copy:
    content: "{}"
    dest: "{{ app_dir }}/traefik/acme/acme.json"
    mode: "0600"
    force: no

- name: Copy maintenance.html
  template:
    src: maintenance.html
    dest: "{{ app_dir }}/maintenance/maintenance.html"

- name: Configure voty user service
  block:
    - name: Create user systemd directory
      file:
        path: "{{ ansible_env.HOME }}/.config/systemd/user"
        state: directory
        mode: "0755"
    - name: Install voty service unit
      template:
        src: voty.service.j2
        dest: "{{ ansible_env.HOME }}/.config/systemd/user/voty.service"
        mode: "0644"
      notify: reload user systemd
    - name: Flush handlers
      meta: flush_handlers

- name: Deploy config files
  block:
    - name: Copy docker-compose file
      template:
        src: ../docker-compose.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        mode: "0600"
    - name: Copy nginx config
      template:
        src: ../nginx/default.conf
        dest: "{{ app_dir }}/nginx/default.conf"
        mode: "0600"
    - name: Create .env file
      template:
        src: "{{ env_file }}"
        dest: "{{ app_dir }}/.env"
        mode: "0600"
