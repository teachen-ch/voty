type Query {
  activities(first: Int, last: Int, orderBy: [ActivityOrderByInput!], where: ActivityWhereInput): [Activity!]!
  attachments(where: AttachmentWhereInput): [Attachment!]!
  ballot(where: BallotWhereUniqueInput!): Ballot
  ballots(where: BallotWhereInput): [Ballot!]!
  cards(age: String, keywords: String, type: String): [Card!]
  getBallotResults(ballotId: String!, ballotRunId: String, canton: String, schoolId: String, teamId: String): BallotResults
  getBallotRuns(locale: String, teamId: String!): [BallotRun!]
  getTeamDiscussions(ballotId: String, card: String, teamId: String): [Discussion!]
  me: User
  progress(teamId: String!): ResponseProgress!
  school(where: SchoolWhereUniqueInput!): School
  schools(where: SchoolWhereInput): [School!]!
  stats(from: Float, to: Float): Stats!
  swissvotes(hasPosters: Boolean, keywords: String, limit: Int, offset: Int, result: Int, sort: String, type: Int): [Swissvote!]
  team(where: TeamWhereUniqueInput!): Team
  teams(orderBy: [TeamOrderByInput!], where: TeamWhereInput): [Team!]!
  user(where: UserWhereUniqueInput!): User
  users(first: Int, last: Int, orderBy: [UserOrderByInput!], where: UserWhereInput): [User!]!
  works(where: WorkWhereInput): [Work!]!
}

