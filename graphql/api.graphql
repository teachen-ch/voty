type Activity {
  ballotId: String
  card: String
  id: Int
  school: School
  summary: String
  team: Team
  time: DateTime
  type: ActivityType
  user: User
  visibility: Visibility
  workId: String
}

enum ActivityType {
  Attachment
  Discussion
  Test
  UserAccept
  UserInvite
  Vote
  Work
}

type Attachment {
  createdAt: DateTime
  file: String
  id: ID
  title: String
  type: String
  updatedAt: DateTime
  user: User
}

type Ballot {
  body: String
  canVote: Boolean
  canton: String
  description: String
  end: DateTime
  hasVoted: Boolean
  id: ID
  originalLocale: String
  schoolId: String
  scope: BallotScope
  start: DateTime
  teamId: String
  title: String
}

type BallotResults {
  abs: Int
  no: Int
  total: Int
  yes: Int
}

type BallotRun {
  ballotId: String
  end: DateTime
  id: ID
  start: DateTime
  team: Team
}

enum BallotScope {
  Cantonal
  National
  Public
  School
  Team
}

type Card {
  age: String
  content: String
  description: String
  discussion: Boolean
  duration: String
  icon: String
  id: String
  keywords: String
  show: String
  source: String
  title: String
  type: String
  url: String
}

"""
A date-time string at UTC, such as 2007-12-03T10:15:30Z, compliant with the `date-time` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar DateTime

type Discussion {
  attachments: [Attachment!]
  ballotId: String
  card: String
  children: [Discussion!]
  createdAt: DateTime
  id: ID
  reactions: [Reaction!]
  text: String
  title: String
  updatedAt: DateTime
  user: User
}

enum Gender {
  Female
  Male
  Other
  Unkown
}

type InviteResponse {
  created: [String!]
  duplicated: [String!]
  failed: [String!]
  team: Team
}

"""
The `JSON` scalar type represents JSON objects as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar Json

type Mutation

type ProgressCard {
  done: [User!]
  due: [User!]
  id: String
}

type ProgressStudent {
  done: [String!]
  due: [String!]
  email: String
  id: String
}

type Query

type Reaction {
  discussion: Discussion
  emoij: String
  id: ID
  user: User
}

type Response {
  error: Boolean
  message: String
  success: Boolean
}

type ResponseLogin {
  token: String
  user: User
}

type ResponseProgress {
  cards: [ProgressCard!]
  students: [ProgressStudent!]
}

enum Role {
  Admin
  Principal
  Student
  Teacher
  User
}

type School {
  address: String
  canton: String
  city: String
  id: ID
  members: [User!]
  name: String
  teams: [Team!]
  type: String
  zip: String
}

type Stats {
  stats: Json
}

type Swissvote {
  annahme: Int
  anr: String
  datum: String
  kategorien: String
  poster_ja: String
  poster_nein: String
  rechtsform: Int
  stand: Int
  stichwort: String
  swissvoteslink: String
  titel_kurz_d: String
  titel_off_d: String
  volk: Int
}

type Team {
  ballots: [Ballot!]
  cards: String
  code: String
  id: ID
  invite: String
  members: [User!]
  name: String
  notes: Json
  prefs: Json
  school: School
  teacher: User
  teacherId: String
}

type User {
  attachments: [Attachment!]
  ballots: [Ballot!]
  campaign: String
  createdAt: DateTime
  discussions: [Discussion!]
  email: String
  emailVerified: DateTime
  gender: Gender
  id: ID
  image: String
  lastname: String
  locale: String
  name: String
  reactions: [Reaction!]
  role: Role
  school: School
  shortname: String
  teaches: [Team!]
  team: Team
  year: Int
}

enum Visibility {
  Private
  Public
  School
  Team
}

type Vote {
  ballot: Ballot
  verify: String
}

enum VotingStatus {
  Closed
  NotStarted
  Open
  Restricted
  Voted
}

type Work {
  attachments: [Attachment!]
  card: String
  data: Json
  id: ID
  reactions: [Reaction!]
  text: String
  title: String
  updatedAt: DateTime
  users: [User!]
}