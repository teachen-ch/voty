overwrite: true
schema: "graphql/api.graphql"
documents: ["**/*.tsx"]
generates:
  graphql/types.ts:
    plugins:
      - "typescript"
      - "typescript-operations"
      - "typescript-react-apollo"
      #- "typescript-document-nodes"
      - "fragment-matcher"
    config:
      reactApolloVersion: 3
      withHooks: true
      withHOC: false
      withComponent: false
      addDocBlocks: false
      scalars:
        DateTime: any
        Json: any
  graphql/modules.d.ts:
    plugins:
      - "typescript-graphql-files-modules"
